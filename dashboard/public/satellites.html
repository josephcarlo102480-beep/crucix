<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRUCIX — Satellite Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
<script src="https://unpkg.com/globe.gl@2.35.2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020408;--panel:rgba(6,14,22,0.92);--glass:rgba(10,20,32,0.7);
  --border:rgba(100,240,200,0.12);--border-bright:rgba(100,240,200,0.3);
  --text:#e8f4f0;--dim:#6a8a82;--accent:#64f0c8;--accent2:#44ccff;
  --warn:#ffb84c;--danger:#ff5f63;--mono:'IBM Plex Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden}
#app{display:flex;height:100vh;width:100vw}
#sidebar{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;z-index:10}
#globe-container{flex:1;position:relative;overflow:hidden;width:calc(100vw - 280px);height:100vh}
.logo{padding:16px;border-bottom:1px solid var(--border);text-align:center}
.logo h1{font-size:14px;letter-spacing:0.15em;color:var(--accent)}
.logo .sub{font-size:10px;color:var(--dim);margin-top:4px}
.back-link{display:block;padding:8px 16px;color:var(--accent2);font-size:10px;text-decoration:none;border-bottom:1px solid var(--border);letter-spacing:0.08em}
.back-link:hover{background:rgba(68,204,255,0.08)}
.cat-section{padding:8px 0}
.cat-btn{display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;background:none;border:none;border-bottom:1px solid rgba(255,255,255,0.03);color:var(--text);font-family:var(--mono);font-size:11px;cursor:pointer;text-align:left;transition:all 0.2s}
.cat-btn:hover{background:rgba(100,240,200,0.06)}
.cat-btn.active{background:rgba(100,240,200,0.1);border-left:2px solid var(--accent)}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.cat-name{flex:1}
.cat-count{font-size:9px;color:var(--dim)}
.cat-btn.loading .cat-count::after{content:'...';animation:dots 1s steps(3,end) infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
#status{padding:12px 16px;border-top:1px solid var(--border);font-size:9px;color:var(--dim);margin-top:auto}
#satPopup{display:none;position:fixed;z-index:9999;pointer-events:auto}
#satPopup .popup-inner{background:var(--panel);border:1px solid var(--border-bright);padding:12px;font-size:11px;max-width:300px;box-shadow:0 4px 24px rgba(0,0,0,0.5)}
#satPopup .popup-title{color:var(--accent);font-weight:600;margin-bottom:6px;font-size:12px}
#satPopup .popup-row{margin-bottom:3px;color:var(--dim)}
#satPopup .popup-row span{color:var(--text)}
#satPopup .popup-close{font-size:9px;color:var(--dim);margin-top:8px;cursor:pointer}
#satPopup .popup-close:hover{color:var(--accent)}
.observer-info{padding:8px 16px;border-bottom:1px solid var(--border);font-size:9px;color:var(--dim)}
.leaflet-container{background:var(--bg) !important}
.leaflet-control-zoom a{background:var(--panel) !important;color:var(--accent) !important;border-color:var(--border) !important}
.observer-marker{color:#ffb84c;font-size:22px;font-weight:bold;text-align:center;line-height:20px;text-shadow:0 0 8px rgba(255,184,76,0.6)}
.passes-header{padding:8px 16px;font-size:10px;color:var(--accent);letter-spacing:0.08em;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
#passes{max-height:40vh;overflow-y:auto}
.pass-item{padding:6px 16px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:10px}
.pass-item.overhead{background:rgba(100,240,200,0.08);border-left:2px solid var(--accent)}
.pass-name{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pass-detail{color:var(--dim);font-size:9px;margin-top:2px}
.pass-empty{padding:8px 16px;font-size:9px;color:var(--dim)}
.conj-header{padding:8px 16px;font-size:10px;color:var(--danger);letter-spacing:0.08em;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
#conjunctions{max-height:30vh;overflow-y:auto}
.conj-item{padding:6px 16px;border-bottom:1px solid rgba(255,255,255,0.03);font-size:10px;cursor:pointer;transition:background 0.15s}
.conj-item:hover{background:rgba(255,255,255,0.05)}
.conj-item.critical{border-left:2px solid #ff5f63;background:rgba(255,95,99,0.1)}
.conj-item.warning{border-left:2px solid #ff9800;background:rgba(255,152,0,0.07)}
.conj-item.watch{border-left:2px solid #ffeb3b;background:rgba(255,235,59,0.05)}
.conj-names{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conj-detail{color:var(--dim);font-size:9px;margin-top:2px}
.conj-pulse{width:20px;height:20px;border-radius:50%;position:relative}
.conj-pulse::before,.conj-pulse::after{content:'';position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.conj-pulse::before{width:8px;height:8px;background:var(--danger);box-shadow:0 0 8px var(--danger)}
.conj-pulse::after{width:20px;height:20px;border:2px solid var(--danger);animation:conj-ring 1.5s ease-out infinite;opacity:0}
@keyframes conj-ring{0%{width:8px;height:8px;opacity:0.8}100%{width:30px;height:30px;opacity:0}}
.conj-pulse.warning::before{background:#ff9800;box-shadow:0 0 8px #ff9800}
.conj-pulse.warning::after{border-color:#ff9800}
.conj-pulse.watch::before{background:#ffeb3b;box-shadow:0 0 8px #ffeb3b}
.conj-pulse.watch::after{border-color:#ffeb3b}
#map2d,#globe3d{position:absolute;top:0;left:0;width:100%;height:100%}
#globe3d{visibility:hidden;pointer-events:none}
#view-toggle{position:absolute;top:12px;right:12px;z-index:1000;display:flex;border:1px solid var(--border);border-radius:4px;overflow:hidden;font-family:var(--mono);font-size:11px;letter-spacing:0.06em;cursor:pointer}
#view-toggle .vtg{padding:6px 14px;background:var(--panel);color:var(--dim);border:none;font-family:var(--mono);font-size:11px;cursor:pointer;transition:all 0.2s}
#view-toggle .vtg:first-child{border-right:1px solid var(--border)}
#view-toggle .vtg.active{color:var(--accent);background:rgba(100,240,200,0.12);text-shadow:0 0 8px rgba(100,240,200,0.4)}
#view-toggle:hover{border-color:var(--border-bright);box-shadow:0 0 12px rgba(100,240,200,0.1)}
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div class="logo">
      <h1>CRUCIX SATELLITE TRACKER</h1>
      <div class="sub">Real-time orbital tracking</div>
    </div>
    <a href="/" class="back-link">&larr; BACK TO DASHBOARD</a>
    <div class="observer-info">
      OBSERVER: 30.5155N, 90.5063W<br>Independence, LA
    </div>
    <div class="cat-section">
      <button class="cat-btn" data-cat="iss">
        <div class="cat-dot" style="background:#ffffff;box-shadow:0 0 6px rgba(255,255,255,0.6)"></div>
        <span class="cat-name">ISS</span>
        <span class="cat-count"></span>
      </button>
      <button class="cat-btn" data-cat="military">
        <div class="cat-dot" style="background:#ff5f63;box-shadow:0 0 6px rgba(255,95,99,0.6)"></div>
        <span class="cat-name">Military</span>
        <span class="cat-count"></span>
      </button>
      <button class="cat-btn" data-cat="starlink">
        <div class="cat-dot" style="background:#4488ff;box-shadow:0 0 6px rgba(68,136,255,0.6)"></div>
        <span class="cat-name">Starlink</span>
        <span class="cat-count"></span>
      </button>
      <button class="cat-btn" data-cat="oneweb">
        <div class="cat-dot" style="background:#69f0ae;box-shadow:0 0 6px rgba(105,240,174,0.6)"></div>
        <span class="cat-name">OneWeb</span>
        <span class="cat-count"></span>
      </button>
      <button class="cat-btn" data-cat="gps">
        <div class="cat-dot" style="background:#ff9800;box-shadow:0 0 6px rgba(255,152,0,0.6)"></div>
        <span class="cat-name">GPS</span>
        <span class="cat-count"></span>
      </button>
    </div>
    <div class="passes-header">UPCOMING PASSES (12H)</div>
    <div id="passes"><div class="pass-empty">Load satellites to see passes</div></div>
    <div class="conj-header">CONJUNCTIONS (12H)</div>
    <div id="conjunctions"><div class="pass-empty">Load satellites to check conjunctions</div></div>
    <div id="status">Ready. Click a category to load satellites.</div>
  </div>
  <div id="globe-container">
    <div id="map2d"></div>
    <div id="globe3d"></div>
    <div id="view-toggle">
      <button class="vtg active" data-view="2d">2D</button>
      <button class="vtg" data-view="3d">3D</button>
    </div>
  </div>
</div>
<div id="satPopup">
  <div class="popup-inner">
    <div class="popup-title"></div>
    <div class="popup-body"></div>
    <div class="popup-close">Click anywhere to close</div>
  </div>
</div>

<script>
// === Satellite Tracker ===
const TLE_API = 'https://tle.ivanstanojevic.me/api/tle';
const OBSERVER = { lat: 30.5155, lng: -90.5063 };
const OBSERVER_GD = {
  longitude: OBSERVER.lng * Math.PI / 180,
  latitude: OBSERVER.lat * Math.PI / 180,
  height: 0.01
};

const CATEGORIES = {
  iss:      { noradId: 25544, query: 'ISS', pageSize: 5, color: '#ffffff', trackColor: 'rgba(255,255,255,0.6)' },
  military: { queries: ['USA', 'NOSS', 'COSMOS'], pageSize: 15, maxTotal: 30, color: '#ff5f63', trackColor: 'rgba(255,95,99,0.5)' },
  starlink: { query: 'starlink', pageSize: 30, color: '#4488ff', trackColor: 'rgba(68,136,255,0.4)' },
  oneweb:   { query: 'oneweb', pageSize: 30, color: '#69f0ae', trackColor: 'rgba(105,240,174,0.4)' },
  gps:      { query: 'GPS', pageSize: 30, color: '#ff9800', trackColor: 'rgba(255,152,0,0.5)' },
};

// State
const loadedCategories = {}; // cat -> { tles: [], satrecs: [], visible: bool }
let globe = null;
let pathLayer = null;
let pointLayer = null;
let conjLayer = null;
let allPaths = [];
let allPoints = [];

// === Globe setup ===
function initGlobe() {
  globe = L.map('map2d', {
    center: [OBSERVER.lat, OBSERVER.lng],
    zoom: 2,
    minZoom: 2,
    maxZoom: 10,
    worldCopyJump: true,
    zoomControl: false,
    attributionControl: false
  });

  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    maxZoom: 18
  }).addTo(globe);

  pathLayer = L.layerGroup().addTo(globe);
  pointLayer = L.layerGroup().addTo(globe);
  conjLayer = L.layerGroup().addTo(globe);

  L.control.zoom({ position: 'bottomright' }).addTo(globe);

  // Observer marker
  L.circleMarker([OBSERVER.lat, OBSERVER.lng], {
    radius: 7, fillColor: '#ffb84c', color: '#fff',
    fillOpacity: 0.9, weight: 2, opacity: 1
  }).addTo(globe);
  L.marker([OBSERVER.lat, OBSERVER.lng], {
    icon: L.divIcon({ className: 'observer-marker', html: '+', iconSize: [20, 20], iconAnchor: [10, 10] }),
    interactive: false
  }).addTo(globe);

  window.addEventListener('resize', () => { globe.invalidateSize(); });
}

// === TLE Fetching ===
async function fetchTLEs(category) {
  const cat = CATEGORIES[category];
  if (!cat) return [];

  setStatus(`Fetching ${category} TLEs...`);

  try {
    // ISS: fetch by NORAD ID directly for accuracy
    if (cat.noradId) {
      const res = await fetch(`${TLE_API}/${cat.noradId}`);
      const data = await res.json();
      if (data.line1 && data.line2) {
        setStatus(`Loaded ISS (NORAD ${cat.noradId})`);
        return [data];
      }
      return [];
    }

    // Multi-query categories (e.g. military: USA + NOSS + COSMOS)
    if (cat.queries) {
      const seen = new Set();
      const combined = [];
      for (const q of cat.queries) {
        try {
          const url = `${TLE_API}/?search=${encodeURIComponent(q)}&page_size=${cat.pageSize}`;
          const res = await fetch(url);
          const data = await res.json();
          for (const t of (data.member || [])) {
            if (t.line1 && t.line2 && !seen.has(t.satelliteId)) {
              seen.add(t.satelliteId);
              combined.push(t);
              if (combined.length >= (cat.maxTotal || 30)) break;
            }
          }
        } catch (e) { /* skip failed sub-query */ }
        if (combined.length >= (cat.maxTotal || 30)) break;
      }
      setStatus(`Loaded ${combined.length} ${category} satellites`);
      return combined;
    }

    const url = `${TLE_API}/?search=${encodeURIComponent(cat.query)}&page_size=${cat.pageSize}`;
    const res = await fetch(url);
    const data = await res.json();
    const tles = (data.member || []).filter(t => t.line1 && t.line2);
    setStatus(`Loaded ${tles.length} ${category} satellites`);
    return tles;
  } catch (err) {
    setStatus(`Error fetching ${category}: ${err.message}`);
    return [];
  }
}

// === Orbital Propagation ===
function propagatePosition(satrec, time) {
  const posVel = satellite.propagate(satrec, time);
  if (!posVel.position || typeof posVel.position === 'boolean') return null;

  const gmst = satellite.gstime(time);
  const gd = satellite.eciToGeodetic(posVel.position, gmst);

  return {
    lat: satellite.degreesLat(gd.latitude),
    lng: satellite.degreesLong(gd.longitude),
    alt: gd.height, // km
    vel: posVel.velocity ? Math.sqrt(
      posVel.velocity.x ** 2 + posVel.velocity.y ** 2 + posVel.velocity.z ** 2
    ) : 0
  };
}

function generateGroundTrack(satrec, minutesBefore, minutesAfter, intervalSeconds) {
  const points = [];
  const now = new Date();

  for (let t = -minutesBefore * 60; t <= minutesAfter * 60; t += intervalSeconds) {
    const time = new Date(now.getTime() + t * 1000);
    const pos = propagatePosition(satrec, time);
    if (pos) points.push(pos);
  }

  // Break into segments at antimeridian crossings
  if (points.length === 0) return [];

  const segments = [];
  let currentSegment = [points[0]];

  for (let i = 1; i < points.length; i++) {
    const prevLng = points[i - 1].lng;
    const currLng = points[i].lng;
    if (Math.abs(currLng - prevLng) > 180) {
      if (currentSegment.length > 1) segments.push(currentSegment);
      currentSegment = [points[i]];
    } else {
      currentSegment.push(points[i]);
    }
  }
  if (currentSegment.length > 1) segments.push(currentSegment);

  return segments;
}

// === Toggle Category ===
async function toggleCategory(catName) {
  const btn = document.querySelector(`.cat-btn[data-cat="${catName}"]`);

  if (loadedCategories[catName]) {
    // Toggle visibility
    loadedCategories[catName].visible = !loadedCategories[catName].visible;
    btn.classList.toggle('active');
    updateGlobe();
    computePasses();
    computeConjunctions();
    return;
  }

  // Load new category
  btn.classList.add('loading');
  btn.querySelector('.cat-count').textContent = 'loading';

  const tles = await fetchTLEs(catName);
  if (tles.length === 0) {
    btn.classList.remove('loading');
    btn.querySelector('.cat-count').textContent = '0';
    return;
  }

  const satrecs = [];
  for (const tle of tles) {
    try {
      const satrec = satellite.twoline2satrec(tle.line1, tle.line2);
      satrecs.push({ satrec, tle });
    } catch (e) {
      // Skip invalid TLEs
    }
  }

  loadedCategories[catName] = { tles, satrecs, visible: true };
  btn.classList.remove('loading');
  btn.classList.add('active');
  btn.querySelector('.cat-count').textContent = satrecs.length;

  computeTracksAndPositions(catName);
  updateGlobe();
  computePasses();
  computeConjunctions();
}

// === Compute Tracks and Positions ===
function computeTracksAndPositions(catName) {
  const catData = loadedCategories[catName];
  if (!catData) return;

  const cat = CATEGORIES[catName];
  catData.paths = [];
  catData.points = [];

  for (const { satrec, tle } of catData.satrecs) {
    // Ground track: +/- 45 minutes, 60-second intervals
    const segments = generateGroundTrack(satrec, 45, 45, 60);
    for (const seg of segments) {
      catData.paths.push({
        coords: seg.map(p => [p.lat, p.lng]),
        color: cat.trackColor,
        stroke: catName === 'iss' ? 2.0 : 1.0,
        category: catName,
      });
    }

    // Current position
    const now = new Date();
    const pos = propagatePosition(satrec, now);
    if (pos) {
      catData.points.push({
        lat: pos.lat,
        lng: pos.lng,
        alt: pos.alt / 6371 * 0.5 + 0.01, // scale for visibility
        color: cat.color,
        radius: catName === 'iss' ? 0.6 : 0.25,
        category: catName,
        name: tle.name,
        noradId: tle.satelliteId,
        altitude: pos.alt,
        velocity: pos.vel,
        actualLat: pos.lat,
        actualLng: pos.lng,
      });
    }
  }
}

// === Update Globe ===
function updateGlobe() {
  allPaths = [];
  allPoints = [];

  for (const [catName, catData] of Object.entries(loadedCategories)) {
    if (!catData.visible) continue;
    if (catData.paths) allPaths.push(...catData.paths);
    if (catData.points) allPoints.push(...catData.points);
  }

  pathLayer.clearLayers();
  for (const path of allPaths) {
    L.polyline(path.coords, {
      color: path.color,
      weight: path.stroke || 1,
      opacity: 0.8
    }).addTo(pathLayer);
  }

  pointLayer.clearLayers();
  for (const pt of allPoints) {
    L.circleMarker([pt.lat, pt.lng], {
      radius: pt.radius > 0.5 ? 6 : 4,
      fillColor: pt.color,
      color: pt.color,
      fillOpacity: 1,
      weight: 1,
      opacity: 0.8
    }).on('click', () => showSatPopup(pt)).addTo(pointLayer);
  }

  if (viewMode === '3d') update3DGlobe();
}

// === Update Current Positions (periodic) ===
function updatePositions() {
  const now = new Date();

  for (const [catName, catData] of Object.entries(loadedCategories)) {
    if (!catData.visible || !catData.satrecs) continue;

    catData.points = [];
    const cat = CATEGORIES[catName];

    for (const { satrec, tle } of catData.satrecs) {
      const pos = propagatePosition(satrec, now);
      if (pos) {
        catData.points.push({
          lat: pos.lat,
          lng: pos.lng,
          alt: pos.alt / 6371 * 0.5 + 0.01,
          color: cat.color,
          radius: catName === 'iss' ? 0.6 : 0.25,
          category: catName,
          name: tle.name,
          noradId: tle.satelliteId,
          altitude: pos.alt,
          velocity: pos.vel,
          actualLat: pos.lat,
          actualLng: pos.lng,
        });
      }
    }
  }

  // Update only points, keep paths
  allPoints = [];
  for (const [, catData] of Object.entries(loadedCategories)) {
    if (!catData.visible || !catData.points) continue;
    allPoints.push(...catData.points);
  }

  pointLayer.clearLayers();
  for (const pt of allPoints) {
    L.circleMarker([pt.lat, pt.lng], {
      radius: pt.radius > 0.5 ? 6 : 4,
      fillColor: pt.color,
      color: pt.color,
      fillOpacity: 1,
      weight: 1,
      opacity: 0.8
    }).on('click', () => showSatPopup(pt)).addTo(pointLayer);
  }

  if (viewMode === '3d') update3DGlobe();
}

// === Popup ===
function showSatPopup(pt) {
  const popup = document.getElementById('satPopup');
  const title = popup.querySelector('.popup-title');
  const body = popup.querySelector('.popup-body');

  title.textContent = pt.name || 'Unknown';
  body.innerHTML = `
    <div class="popup-row">NORAD ID: <span>${pt.noradId || '?'}</span></div>
    <div class="popup-row">Category: <span>${(pt.category || '').toUpperCase()}</span></div>
    <div class="popup-row">Altitude: <span>${pt.altitude?.toFixed(1) || '?'} km</span></div>
    <div class="popup-row">Velocity: <span>${pt.velocity?.toFixed(2) || '?'} km/s</span></div>
    <div class="popup-row">Lat: <span>${pt.actualLat?.toFixed(4) || '?'}</span></div>
    <div class="popup-row">Lng: <span>${pt.actualLng?.toFixed(4) || '?'}</span></div>
  `;

  popup.style.display = 'block';
  popup.style.top = '50%';
  popup.style.left = '50%';
  popup.style.transform = 'translate(-50%, -50%)';

  const close = () => {
    popup.style.display = 'none';
    document.removeEventListener('click', closeHandler);
  };
  const closeHandler = (e) => {
    if (!popup.contains(e.target)) close();
  };
  setTimeout(() => document.addEventListener('click', closeHandler), 100);
}

// === Status ===
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// === Pass Predictions ===
function computeLookAngles(satrec, time) {
  const posVel = satellite.propagate(satrec, time);
  if (!posVel.position || typeof posVel.position === 'boolean') return null;
  const gmst = satellite.gstime(time);
  const ecf = satellite.eciToEcf(posVel.position, gmst);
  const look = satellite.ecfToLookAngles(OBSERVER_GD, ecf);
  return {
    azimuth: look.azimuth * 180 / Math.PI,
    elevation: look.elevation * 180 / Math.PI,
    range: look.rangeSat
  };
}

function azToBearing(azDeg) {
  const dirs = ['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  return dirs[Math.round(((azDeg % 360) + 360) % 360 / 22.5) % 16];
}

function computePasses() {
  const passes = [];
  const now = new Date();
  const stepSec = 60;
  const hoursAhead = 12;

  for (const [catName, catData] of Object.entries(loadedCategories)) {
    if (!catData.visible || !catData.satrecs) continue;
    const cat = CATEGORIES[catName];

    for (const { satrec, tle } of catData.satrecs) {
      let inPass = false, passMaxEl = 0, passMaxElTime = null, passMaxElAz = 0;

      for (let t = 0; t <= hoursAhead * 3600; t += stepSec) {
        const time = new Date(now.getTime() + t * 1000);
        const look = computeLookAngles(satrec, time);
        if (!look) continue;

        if (look.elevation > 0) {
          if (!inPass) { inPass = true; passMaxEl = 0; }
          if (look.elevation > passMaxEl) {
            passMaxEl = look.elevation;
            passMaxElTime = time;
            passMaxElAz = look.azimuth;
          }
        } else if (inPass) {
          if (passMaxEl > 5) {
            passes.push({
              name: tle.name, category: catName, color: cat.color,
              maxElTime: passMaxElTime, maxEl: passMaxEl,
              azimuth: passMaxElAz, bearing: azToBearing(passMaxElAz)
            });
          }
          inPass = false;
        }
      }
      if (inPass && passMaxEl > 5) {
        passes.push({
          name: tle.name, category: catName, color: cat.color,
          maxElTime: passMaxElTime, maxEl: passMaxEl,
          azimuth: passMaxElAz, bearing: azToBearing(passMaxElAz)
        });
      }
    }
  }

  passes.sort((a, b) => a.maxElTime - b.maxElTime);
  renderPasses(passes);
}

function renderPasses(passes) {
  const el = document.getElementById('passes');
  if (passes.length === 0) {
    el.innerHTML = '<div class="pass-empty">No upcoming passes</div>';
    return;
  }
  el.innerHTML = passes.slice(0, 30).map(p => {
    const oh = p.maxEl > 60;
    const t = p.maxElTime.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const d = p.maxElTime.toLocaleDateString([], { month: 'short', day: 'numeric' });
    return `<div class="pass-item${oh ? ' overhead' : ''}">
      <div class="pass-name" style="color:${p.color}">${p.name || 'Unknown'}</div>
      <div class="pass-detail">${d} ${t} · El ${p.maxEl.toFixed(0)}° · ${p.bearing} (${p.azimuth.toFixed(0)}°)${oh ? ' · OVERHEAD' : ''}</div>
    </div>`;
  }).join('');
}

// === Conjunction Predictions ===
let allConjunctions = [];

function propagateECI(satrec, time) {
  const posVel = satellite.propagate(satrec, time);
  if (!posVel.position || typeof posVel.position === 'boolean') return null;
  return posVel.position; // { x, y, z } in km ECI
}

function eciDistance(a, b) {
  return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2 + (a.z - b.z) ** 2);
}

function computeConjunctions() {
  // Collect all visible satrecs into flat array
  const sats = [];
  for (const [catName, catData] of Object.entries(loadedCategories)) {
    if (!catData.visible || !catData.satrecs) continue;
    for (const { satrec, tle } of catData.satrecs) {
      sats.push({ satrec, tle, category: catName });
    }
  }

  if (sats.length < 2) {
    allConjunctions = [];
    renderConjunctions([]);
    conjLayer.clearLayers();
    return;
  }

  setStatus(`Computing conjunctions for ${sats.length} satellites...`);

  const now = new Date();
  const stepSec = 120; // 2-minute intervals
  const hoursAhead = 12;
  const thresholdKm = 50;

  // Track closest approach per pair: key = "i-j", value = { minDist, time, ... }
  const pairMap = new Map();

  for (let t = 0; t <= hoursAhead * 3600; t += stepSec) {
    const time = new Date(now.getTime() + t * 1000);

    // Propagate all satellites to ECI at this timestep
    const positions = [];
    for (let i = 0; i < sats.length; i++) {
      positions.push(propagateECI(sats[i].satrec, time));
    }

    // Compare all pairs
    for (let i = 0; i < sats.length; i++) {
      if (!positions[i]) continue;
      for (let j = i + 1; j < sats.length; j++) {
        if (!positions[j]) continue;
        const dist = eciDistance(positions[i], positions[j]);
        if (dist < thresholdKm) {
          const key = `${i}-${j}`;
          const existing = pairMap.get(key);
          if (!existing || dist < existing.minDist) {
            pairMap.set(key, { i, j, minDist: dist, time });
          }
        }
      }
    }
  }

  // Build conjunction list with geodetic positions at closest approach
  const conjunctions = [];
  for (const [, entry] of pairMap) {
    const posA = propagatePosition(sats[entry.i].satrec, entry.time);
    const posB = propagatePosition(sats[entry.j].satrec, entry.time);
    if (!posA || !posB) continue;

    // Midpoint for map display
    const midLat = (posA.lat + posB.lat) / 2;
    const midLng = (posA.lng + posB.lng) / 2;

    let severity, severityClass;
    if (entry.minDist < 10) { severity = 'CRITICAL'; severityClass = 'critical'; }
    else if (entry.minDist < 25) { severity = 'WARNING'; severityClass = 'warning'; }
    else { severity = 'WATCH'; severityClass = 'watch'; }

    conjunctions.push({
      nameA: sats[entry.i].tle.name || 'Unknown',
      nameB: sats[entry.j].tle.name || 'Unknown',
      minDist: entry.minDist,
      time: entry.time,
      altA: posA.alt,
      altB: posB.alt,
      latA: posA.lat, lngA: posA.lng,
      latB: posB.lat, lngB: posB.lng,
      midLat, midLng,
      severity, severityClass,
    });
  }

  conjunctions.sort((a, b) => a.minDist - b.minDist);
  allConjunctions = conjunctions;
  renderConjunctions(conjunctions);
  drawConjunctionMarkers();
  setStatus(conjunctions.length > 0
    ? `Found ${conjunctions.length} conjunction(s) within 50km`
    : `No conjunctions found. ${sats.length} satellites checked.`);
}

function renderConjunctions(conjunctions) {
  const el = document.getElementById('conjunctions');
  if (conjunctions.length === 0) {
    el.innerHTML = '<div class="pass-empty">No close approaches predicted in next 12h</div>';
    return;
  }
  el.innerHTML = conjunctions.slice(0, 20).map((c, idx) => {
    const t = c.time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const d = c.time.toLocaleDateString([], { month: 'short', day: 'numeric' });
    const distColor = c.severityClass === 'critical' ? '#ff5f63' : c.severityClass === 'warning' ? '#ff9800' : '#ffeb3b';
    return `<div class="conj-item ${c.severityClass}" data-conj-idx="${idx}">
      <div class="conj-names" style="color:${distColor}">${c.nameA} / ${c.nameB}</div>
      <div class="conj-detail">${d} ${t} · ${c.minDist.toFixed(1)} km · ${c.severity}</div>
      <div class="conj-detail">Alt: ${c.altA.toFixed(0)} km / ${c.altB.toFixed(0)} km</div>
    </div>`;
  }).join('');
}

function drawConjunctionMarkers() {
  conjLayer.clearLayers();
  for (const c of allConjunctions) {
    // Pulsing marker at midpoint
    const pulseClass = c.severityClass === 'critical' ? '' : ` ${c.severityClass}`;
    L.marker([c.midLat, c.midLng], {
      icon: L.divIcon({
        className: '',
        html: `<div class="conj-pulse${pulseClass}"></div>`,
        iconSize: [20, 20],
        iconAnchor: [10, 10],
      }),
      interactive: false,
    }).addTo(conjLayer);

    // Line connecting the two satellites at closest approach
    const lineColor = c.severityClass === 'critical' ? '#ff5f63' : c.severityClass === 'warning' ? '#ff9800' : '#ffeb3b';
    L.polyline([[c.latA, c.lngA], [c.latB, c.lngB]], {
      color: lineColor,
      weight: 2,
      opacity: 0.7,
      dashArray: '6,4',
    }).addTo(conjLayer);
  }
}

function centerOnConjunction(idx) {
  const c = allConjunctions[idx];
  if (!c) return;
  if (viewMode === '3d' && globe3d) {
    globe3d.pointOfView({ lat: c.midLat, lng: c.midLng, altitude: 1.5 }, 1000);
  } else {
    globe.setView([c.midLat, c.midLng], 5, { animate: true });
  }
}

// === 3D Globe (Globe.gl) ===
let globe3d = null;
let viewMode = '2d';

function init3DGlobe() {
  const container = document.getElementById('globe3d');
  globe3d = Globe()(container)
    .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
    .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
    .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
    .showAtmosphere(true)
    .atmosphereColor('#64f0c8')
    .atmosphereAltitude(0.15)
    .pointOfView({ lat: OBSERVER.lat, lng: OBSERVER.lng, altitude: 2.5 })
    // Satellite points
    .pointsData([])
    .pointLat('lat')
    .pointLng('lng')
    .pointAltitude('alt3d')
    .pointColor(d => d.color)
    .pointRadius(d => d.r3d)
    .pointsMerge(false)
    .onPointClick(pt => showSatPopup(pt))
    // Ground tracks
    .pathsData([])
    .pathPoints('coords3d')
    .pathPointLat(p => p[0])
    .pathPointLng(p => p[1])
    .pathPointAlt(0)
    .pathColor(d => d.color3d)
    .pathStroke(d => d.stroke3d)
    .pathTransitionDuration(0);

  // Observer point — add a custom ring
  globe3d.ringsData([{ lat: OBSERVER.lat, lng: OBSERVER.lng }])
    .ringLat('lat').ringLng('lng')
    .ringColor(() => '#ffb84c')
    .ringMaxRadius(1.2)
    .ringPropagationSpeed(0.8)
    .ringRepeatPeriod(1200);
}

function update3DGlobe() {
  if (!globe3d) return;

  // Build points data for 3D
  const pts3d = allPoints.map(pt => ({
    ...pt,
    alt3d: pt.altitude / 6371 * 0.5 + 0.005,
    r3d: pt.radius > 0.5 ? 0.4 : 0.2,
  }));

  // Build paths data for 3D
  const paths3d = allPaths.map(p => ({
    coords3d: p.coords,
    color3d: p.color,
    stroke3d: (p.stroke || 1) * 0.6,
  }));

  globe3d.pointsData(pts3d);
  globe3d.pathsData(paths3d);
}

function setViewMode(mode) {
  if (mode === viewMode) return;
  viewMode = mode;
  const map2d = document.getElementById('map2d');
  const g3d = document.getElementById('globe3d');
  const btns = document.querySelectorAll('#view-toggle .vtg');

  btns.forEach(b => b.classList.toggle('active', b.dataset.view === mode));

  if (mode === '3d') {
    map2d.style.visibility = 'hidden';
    map2d.style.pointerEvents = 'none';
    g3d.style.visibility = 'visible';
    g3d.style.pointerEvents = 'auto';
    // Defer Globe.gl init to next frame so container has layout dimensions
    requestAnimationFrame(() => {
      if (!globe3d) init3DGlobe();
      const rect = document.getElementById('globe-container').getBoundingClientRect();
      globe3d.width(rect.width);
      globe3d.height(rect.height);
      update3DGlobe();
    });
  } else {
    g3d.style.visibility = 'hidden';
    g3d.style.pointerEvents = 'none';
    map2d.style.visibility = 'visible';
    map2d.style.pointerEvents = 'auto';
    globe.invalidateSize();
  }
}

// === Init ===
document.addEventListener('DOMContentLoaded', () => {
  initGlobe();

  // Category button clicks
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleCategory(btn.dataset.cat));
  });

  // View toggle
  document.querySelectorAll('#view-toggle .vtg').forEach(btn => {
    btn.addEventListener('click', () => setViewMode(btn.dataset.view));
  });

  // Conjunction click-to-center (event delegation)
  document.getElementById('conjunctions').addEventListener('click', (e) => {
    const item = e.target.closest('.conj-item');
    if (item) centerOnConjunction(parseInt(item.dataset.conjIdx, 10));
  });

  // Auto-update positions every 15 seconds
  setInterval(updatePositions, 15000);

  // Resize 3D globe on window resize
  window.addEventListener('resize', () => {
    if (globe3d && viewMode === '3d') {
      const rect = document.getElementById('globe-container').getBoundingClientRect();
      globe3d.width(rect.width);
      globe3d.height(rect.height);
    }
  });

  setStatus('Ready. Click a category to load satellites.');
});
</script>
