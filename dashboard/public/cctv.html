<!DOCTYPE html>
<!--
  Crucix — Public CCTV Camera Layer (Module B, standalone page)
  Isolated. Talks only to /api/cctv/*. Own Globe.gl instance (same CDN as
  satellites.html). Does not touch jarvis.html/satellites.html.

  The backend caps the global set (~400 cameras, MAX_CAMERAS in
  cctvCameras.mjs), so all cameras render on load at the default zoom —
  no viewport gating. MAX_VISIBLE_POINTS below is the client-side cap.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crucix — CCTV</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/globe.gl@2.33.0"></script>
<style>
:root{
  --bg:#020408;--panel:rgba(6,14,22,0.92);--glass:rgba(10,20,32,0.7);
  --border:rgba(100,240,200,0.12);--border-bright:rgba(100,240,200,0.3);
  --text:#e8f4f0;--dim:#6a8a82;--accent:#64f0c8;--accent2:#44ccff;
  --warn:#ffb84c;--danger:#ff5f63;--mono:'IBM Plex Mono',monospace;
  --cctv:#ff8c42;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:var(--mono);overflow:hidden}
#wrap{display:flex;height:100vh}
#sidebar{width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;z-index:10}
.logo{padding:16px}
.logo h1{font-size:14px;letter-spacing:0.15em;color:var(--cctv);margin:0}
.logo .sub{font-size:10px;color:var(--dim);margin-top:4px}
.back-link{display:block;padding:8px 16px;color:var(--accent2);font-size:10px;text-decoration:none;border-top:1px solid var(--border);border-bottom:1px solid var(--border);letter-spacing:0.08em}
.back-link:hover{background:rgba(68,204,255,0.08)}
.info{padding:12px 16px;font-size:10px;color:var(--dim);line-height:1.7}
.info b{color:var(--text);font-weight:400}
.info .hl{color:var(--cctv)}
#status{padding:12px 16px;border-top:1px solid var(--border);font-size:9px;color:var(--dim);margin-top:auto;line-height:1.6}
#globe-container{flex:1;position:relative;overflow:hidden}
/* position:fixed so it's viewport-relative and never clipped by the
   globe container's overflow:hidden. */
#popup{position:fixed;display:none;z-index:200;background:var(--panel);border:1px solid var(--border-bright);padding:12px;font-size:11px;max-width:340px;box-shadow:0 4px 24px rgba(0,0,0,0.6)}
/* On phones/narrow screens, show it as a centered modal so a tap anywhere
   always brings up a fully-visible popup. */
@media (max-width:760px){
  #popup{left:50%!important;top:50%!important;transform:translate(-50%,-50%);width:92vw;max-width:92vw}
  #popup img,#popup .iframe-wrap{max-width:100%!important;width:100%!important}
}
#popup .ptitle{color:var(--cctv);font-weight:600;margin-bottom:4px;font-size:12px}
#popup .pmeta{color:var(--dim);margin-bottom:8px;font-size:10px}
#popup img{max-width:316px;max-height:200px;display:block;background:#000;border:1px solid var(--border)}
#popup .pmsg{color:var(--dim);font-size:10px;padding:8px 0}
#popup .prow{display:flex;gap:10px;margin-top:8px;align-items:center}
#popup a,#popup button{color:var(--accent);font-family:var(--mono);font-size:10px;background:none;border:1px solid var(--border-bright);padding:5px 8px;cursor:pointer;text-decoration:none}
#popup a:hover,#popup button:hover{background:rgba(100,240,200,0.1)}
#popup .pclose{margin-left:auto;border:none;color:var(--dim)}
.iframe-wrap{position:relative;width:316px;height:178px;background:#000;border:1px solid var(--border)}
.iframe-wrap iframe,.iframe-wrap video{width:100%;height:100%;border:0;display:block;object-fit:cover;background:#000}
.media-img{position:relative;width:316px;max-width:100%}
.live-badge{position:absolute;top:6px;left:6px;background:rgba(0,0,0,0.6);color:var(--danger);font-size:9px;letter-spacing:0.1em;padding:2px 6px;border:1px solid var(--danger);pointer-events:none}
/* "N cameras here" disambiguation chooser, shown when dots overlap. */
.cl-head{color:var(--dim);font-size:10px;margin-bottom:6px}
.cl-list{display:flex;flex-direction:column;gap:3px;max-height:120px;overflow-y:auto;margin-bottom:10px;border:1px solid var(--border);padding:4px}
.cl-item{display:flex;flex-direction:column;align-items:flex-start;gap:1px;width:100%;text-align:left;background:none;border:1px solid transparent;color:var(--text);font-family:var(--mono);font-size:10px;padding:4px 6px;cursor:pointer}
.cl-item:hover{background:rgba(100,240,200,0.08)}
.cl-item.active{border-color:var(--border-bright);background:rgba(255,140,66,0.12)}
.cl-item .cl-name{color:var(--text)}
.cl-item.active .cl-name{color:var(--cctv)}
.cl-item .cl-src{color:var(--dim);font-size:9px}
</style>
</head>
<body>
<div id="wrap">
  <div id="sidebar">
    <div class="logo"><h1>CRUCIX · CCTV</h1><div class="sub">PUBLIC TRAFFIC CAMERAS</div></div>
    <a class="back-link" href="/">&larr; back to dashboard</a>
    <a class="back-link" href="/satellites.html">satellites &rarr;</a>
    <div class="info">
      <div><b>Cameras loaded:</b> <span class="hl" id="camCount">…</span></div>
      <div style="margin-top:8px">All cameras are shown on load. Drag to rotate, scroll/pinch to zoom.</div>
      <div style="margin-top:8px"><b>Visible now:</b> <span id="visCount">0</span></div>
      <div style="margin-top:8px">Click a dot for the live feed. Where several overlap, a picker lists them all.</div>
    </div>
    <div id="status">initializing…</div>
  </div>
  <div id="globe-container"></div>
</div>
<!-- IMPORTANT: keep #popup OUTSIDE #globe-container — Globe.gl wipes its mount
     element's children on init, which would delete the popup. It is
     position:fixed, so DOM location here is fine. -->
<div id="popup"></div>

<script>
// ─── The backend now caps the global set (~400 cameras), so we render them
//     all immediately at the default zoom — no viewport gate needed. ───
// Hard cap on rendered points; keep at/above the backend MAX_CAMERAS (400).
const MAX_VISIBLE_POINTS = 500;

const API = '/api/cctv';
const statusEl = document.getElementById('status');
const camCountEl = document.getElementById('camCount');
const visCountEl = document.getElementById('visCount');
const popup = document.getElementById('popup');

let allCameras = [];
let liveTimer = null;          // auto-refresh interval for snapshot (JPEG) feeds
let hlsPlayer = null;          // active hls.js instance (destroyed on close/switch)
let currentCluster = [];       // cameras overlapping the last clicked dot
const CLUSTER_PX = 22;         // screen distance (px) that counts as "same spot"
// Live-ish refresh cadence for JPEG feeds. Most traffic cams only update
// every minute+; this also matches the server-side snapshot cache TTL, so
// faster polling here would just replay cached frames.
const SNAPSHOT_REFRESH_MS = 5000;

function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function safeHttpUrl(raw){ try { const u = new URL(raw, location.href); return /^https?:$/.test(u.protocol) ? u.toString() : null; } catch { return null; } }
function setStatus(m){ statusEl.innerHTML = m; }

const globe = Globe()(document.getElementById('globe-container'))
  .globeImageUrl('//unpkg.com/three-globe/example/img/earth-night.jpg')
  .backgroundColor('#020408')
  .pointLat('lat')
  .pointLng('lng')
  .pointColor(() => '#ff8c42')
  .pointAltitude(0.012)
  .pointRadius(0.34)
  .pointLabel(d => `<div style="font-family:monospace;font-size:11px;color:#ff8c42">${esc(d.name)}<br><span style="color:#6a8a82">${esc(d.city)}, ${esc(d.country)} · ${esc(d.source)}</span></div>`)
  .onPointClick(showCamera)
  .pointsData([]);

// Allow closer zoom than the default so clustered dots physically spread apart.
globe.controls().minDistance = 110;

// Render all loaded cameras at once (capped). The set is small enough now
// that no viewport gating is needed — they show on load, at any zoom.
function updateVisiblePoints(){
  const visible = allCameras.slice(0, MAX_VISIBLE_POINTS);
  globe.pointsData(visible);
  visCountEl.textContent = String(visible.length);
}

// Classify a camera into how its feed must be displayed.
function feedKind(cam){
  if (cam.stream_type === 'iframe' && safeHttpUrl(cam.stream_url)) return 'iframe';
  if (cam.stream_type === 'hls' && safeHttpUrl(cam.stream_url)) return 'hls';
  if (cam.feed_url) return 'image';      // static JPEG/PNG snapshot (via proxy)
  if (cam.external_url) return 'external';
  return 'none';
}

function snapshotUrl(id){ return API + '/snapshot?id=' + encodeURIComponent(id) + '&t=' + Date.now(); }

// Rough planar degree-distance (good enough to reject far / back-of-globe points).
function angDistDeg(a, b){
  const mLat = (a.lat + b.lat) / 2 * Math.PI / 180;
  const dLat = a.lat - b.lat;
  const dLng = (a.lng - b.lng) * Math.cos(mLat);
  return Math.hypot(dLat, dLng);
}

// Find every camera that projects to nearly the same screen pixel as `cam`,
// so overlapping/clustered dots can be disambiguated in the popup. Sorted
// nearest-first; always includes `cam` itself.
function getNearby(cam){
  let c0;
  try { c0 = globe.getScreenCoords(cam.lat, cam.lng, 0.012); } catch { return [cam]; }
  if (!c0) return [cam];
  const near = [];
  for (const o of allCameras){
    if (angDistDeg(cam, o) > 6) continue;        // skip far points / opposite face
    let c;
    try { c = globe.getScreenCoords(o.lat, o.lng, 0.012); } catch { continue; }
    if (!c) continue;
    const d = Math.hypot(c.x - c0.x, c.y - c0.y);
    if (d <= CLUSTER_PX) near.push({ cam: o, d });
  }
  near.sort((a, b) => a.d - b.d);
  return near.length ? near.map(x => x.cam) : [cam];
}

// Chooser shown at the top of the popup when several dots overlap.
function clusterChooserHtml(activeId){
  if (currentCluster.length <= 1) return '';
  const items = currentCluster.map(c =>
    `<button class="cl-item${c.id === activeId ? ' active' : ''}" data-cam-id="${esc(c.id)}">
       <span class="cl-name">${esc(c.name)}</span>
       <span class="cl-src">${esc(c.city)}, ${esc(c.country)} · ${esc(c.source)}</span>
     </button>`).join('');
  return `<div class="cl-head">${currentCluster.length} cameras here — pick one:</div><div class="cl-list">${items}</div>`;
}

// Switch the popup to another camera in the same cluster (no reposition).
window.selectClusterCam = function(id){
  const cam = currentCluster.find(c => c.id === id) || allCameras.find(c => c.id === id);
  if (!cam) return;
  renderCameraInto(cam);
};

// Live-ish playback for JPEG feeds: reload the snapshot on an interval,
// double-buffered so a failed/slow frame keeps the last good image.
function startLive(id){
  stopLive();
  liveTimer = setInterval(() => {
    const img = document.getElementById('camImg');
    if (!img){ stopLive(); return; }            // popup closed or feed errored out
    const next = new Image();
    next.onload = () => { const cur = document.getElementById('camImg'); if (cur === img) img.src = next.src; };
    next.src = snapshotUrl(id);                  // on error: keep the last good frame
  }, SNAPSHOT_REFRESH_MS);
}
function stopLive(){ if (liveTimer){ clearInterval(liveTimer); liveTimer = null; } }
// hls.js keeps fetching live segments until destroyed — closing the popup or
// switching cameras without this leaks an active loader per HLS open.
function destroyHlsPlayer(){ if (hlsPlayer){ try { hlsPlayer.destroy(); } catch { /* already dead */ } hlsPlayer = null; } }
window.cctvClose = function(){ stopLive(); destroyHlsPlayer(); popup.style.display = 'none'; };

// Render a camera's popup body in place and (re)start its feed.
function renderCameraInto(cam){
  stopLive();
  destroyHlsPlayer();
  popup.innerHTML = popupHtml(cam);
  const kind = feedKind(cam);
  if (kind === 'hls') setupHls(safeHttpUrl(cam.stream_url));
  if (kind === 'image') startLive(cam.id);
}

function popupHtml(cam){
  const meta = `${esc(cam.city)}, ${esc(cam.country)} · ${esc(cam.source)}`;
  const kind = feedKind(cam);
  let media = '';
  if (kind === 'iframe'){
    media = `<div class="iframe-wrap"><iframe src="${esc(safeHttpUrl(cam.stream_url))}" sandbox="allow-scripts allow-same-origin allow-presentation" referrerpolicy="no-referrer" allow="autoplay; encrypted-media" allowfullscreen></iframe></div>`;
  } else if (kind === 'hls'){
    media = `<div class="iframe-wrap"><video id="camVideo" controls autoplay muted playsinline></video></div>`;
  } else if (kind === 'image'){
    // Proxy-first: the Pi fetches server-side, sidestepping CORS/hotlink/Referer.
    // The frame auto-refreshes (see startLive) so static-JPEG feeds play live-ish.
    // On failure, swap in a graceful "feed unavailable" placeholder.
    media = `<div class="media-img"><img id="camImg" src="${snapshotUrl(cam.id)}" alt="loading feed…"
              onerror="cctvImgFailed(this)" /><span class="live-badge">● LIVE</span></div>`;
  } else if (kind === 'external'){
    media = `<div class="pmsg">No embeddable feed — open the source below.</div>`;
  } else {
    media = `<div class="pmsg">No feed available for this camera.</div>`;
  }
  // Best link-out target for "open ↗".
  const ext = safeHttpUrl(cam.external_url || cam.stream_url || cam.feed_url || '');
  return `${clusterChooserHtml(cam.id)}<div class="ptitle">${esc(cam.name)}</div>
    <div class="pmeta">${meta} <span style="opacity:.6">· ${esc(cam.stream_type || 'image')}</span></div>
    <div id="camMedia">${media}</div>
    ${kind === 'image' ? `<div class="pmsg" style="padding:4px 0">Live snapshot — refreshes every ${(SNAPSHOT_REFRESH_MS/1000)}s.</div>` : ''}
    <div class="prow">
      ${kind === 'image' ? `<button data-action="refresh" data-cam-id="${esc(cam.id)}">↻ refresh</button>` : ''}
      ${ext ? `<a href="${esc(ext)}" target="_blank" rel="noopener">open ↗</a>` : ''}
      <button class="pclose" data-action="close">✕</button>
    </div>`;
}

// Graceful fallback when a proxied image fails to load.
window.cctvImgFailed = function(img){
  const wrap = document.getElementById('camMedia');
  if (wrap) wrap.innerHTML = '<div class="pmsg">⚠ Feed unavailable right now. Use “open ↗” to try the source directly.</div>';
};

window.cctvRefresh = function(id){
  const img = document.getElementById('camImg');
  if (!img) return;
  img.onerror = function(){ cctvImgFailed(img); };
  img.src = snapshotUrl(id);
};

// One delegated listener instead of inline onclick handlers — camera ids come
// from upstream APIs and must never be interpolated into JS-in-attribute
// strings (HTML entity escaping does not protect that context).
popup.addEventListener('click', (e) => {
  const item = e.target.closest('.cl-item');
  if (item){ selectClusterCam(item.dataset.camId); return; }
  const act = e.target.closest('[data-action]');
  if (!act) return;
  if (act.dataset.action === 'refresh') cctvRefresh(act.dataset.camId);
  else if (act.dataset.action === 'close') cctvClose();
});

// Lazy-load hls.js once, then play the stream into the <video> element.
let hlsLoading = null;
function loadHlsLib(){
  if (window.Hls) return Promise.resolve(true);
  if (hlsLoading) return hlsLoading;
  hlsLoading = new Promise((resolve) => {
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/hls.js@1.5.17/dist/hls.min.js';
    s.onload = () => resolve(true);
    s.onerror = () => resolve(false);
    document.head.appendChild(s);
  });
  return hlsLoading;
}

async function setupHls(streamUrl){
  const video = document.getElementById('camVideo');
  if (!video) return;
  // Native HLS (Safari/iOS) — important since the user is usually on a phone.
  if (video.canPlayType('application/vnd.apple.mpegurl')){
    video.src = streamUrl;
    return;
  }
  const ok = await loadHlsLib();
  if (!video.isConnected) return; // popup re-rendered while hls.js was loading
  if (ok && window.Hls && window.Hls.isSupported()){
    const hls = new window.Hls({ liveDurationInfinity: true });
    hlsPlayer = hls;
    hls.on(window.Hls.Events.ERROR, (e, data) => {
      if (data && data.fatal){
        const wrap = document.getElementById('camMedia');
        if (wrap) wrap.innerHTML = '<div class="pmsg">⚠ Stream unavailable right now. Use “open ↗” to view the source.</div>';
      }
    });
    hls.loadSource(streamUrl);
    hls.attachMedia(video);
  } else {
    const wrap = document.getElementById('camMedia');
    if (wrap) wrap.innerHTML = '<div class="pmsg">⚠ HLS not supported here. Use “open ↗” to view the stream.</div>';
  }
}

function showCamera(cam, event){
  // Group all dots stacked under the click so the user can pick the exact one.
  currentCluster = getNearby(cam);
  renderCameraInto(cam);
  popup.style.display = 'block';
  // On phones the CSS centers the popup as a modal; don't fight it.
  if (window.innerWidth <= 760){ popup.style.left = ''; popup.style.top = ''; return; }
  // Desktop: place near the cursor, clamped to the viewport (position:fixed,
  // so clientX/clientY map directly — no offset-parent math needed).
  popup.style.transform = 'none';
  const x = (event && event.clientX) || window.innerWidth/2;
  const y = (event && event.clientY) || window.innerHeight/2;
  const rect = popup.getBoundingClientRect();
  popup.style.left = Math.max(8, Math.min(x + 12, window.innerWidth - rect.width - 12)) + 'px';
  popup.style.top = Math.max(8, Math.min(y + 12, window.innerHeight - rect.height - 12)) + 'px';
}

async function loadCameras(){
  setStatus('fetching cameras…');
  try {
    const res = await fetch(API + '/cameras');
    const data = await res.json();
    allCameras = (data.cameras || []).filter(c => typeof c.lat === 'number' && typeof c.lng === 'number');
    camCountEl.textContent = allCameras.length.toLocaleString();
    const srcCount = Object.keys(data.sources || {}).length;
    setStatus(`${allCameras.length.toLocaleString()} cameras · ${srcCount} sources<br>updated ${esc((data.updated||'').replace('T',' ').slice(0,19))} UTC`);
    updateVisiblePoints();
  } catch (err){
    setStatus('<span style="color:#ff5f63">load failed: ' + esc(err.message) + '</span>');
  }
}

// Initial POV — global view; all camera points are visible immediately.
globe.pointOfView({ lat: 30, lng: 10, altitude: 2.5 });
loadCameras();
// Refresh the (static) location set daily.
setInterval(loadCameras, 12 * 60 * 60 * 1000);
</script>
</body>
</html>
